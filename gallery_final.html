<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Our Memories 💙</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>⁸
    :root {
      --rose:     #f43f72;
      --ink:      #2d1b33;
      --mist:     #f9f4ff;
      --lavender: #c4b5fd;
      --card-bg:  rgba(255,255,255,0.82);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
      background:
        linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)),
        url('https://lh3.googleusercontent.com/d/18_0k8hOoIJKi3FJ8LisFWaiYDmgwwMFo') no-repeat center center;
      background-size: cover;
      background-repeat: no-repeat;
      background-color: #9f4fdd81;
      background-position: center 8%;
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 10% 20%, rgba(251,194,235,0.45) 0%, transparent 70%),
        radial-gradient(ellipse 50% 60% at 90% 80%, rgba(161,196,253,0.4) 0%, transparent 70%),
        radial-gradient(ellipse 40% 40% at 50% 50%, rgba(255,236,210,0.35) 0%, transparent 80%);
      pointer-events: none;
      z-index: 0;
    }

    .page {
      position: relative;
      z-index: 1;
      max-width: 960px;
      margin: 0 auto;
      padding: 60px 20px 100px;
    }

    .page-header {
      text-align: center;
      margin-bottom: 56px;
      animation: fadeDown 0.8s ease both;
    }
    .page-header .eyebrow {
      font-size: 11px;
      letter-spacing: 3.5px;
      text-transform: uppercase;
      color: var(--rose);
      font-weight: 500;
      margin-bottom: 12px;
    }
    .page-header h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(32px, 7vw, 52px);
      color: var(--ink);
      line-height: 1.1;
    }
    .page-header h1 em { color: var(--rose); font-style: italic; }
    .page-header p {
      margin-top: 14px;
      font-size: 15px;
      color: #9d7aab;
      max-width: 380px;
      margin-inline: auto;
      line-height: 1.7;
    }
    .divider {
      display: flex; align-items: center; gap: 10px;
      justify-content: center; margin: 24px auto 0;
      color: var(--lavender); font-size: 18px;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; max-width: 80px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--lavender));
    }
    .divider::after { transform: scaleX(-1); }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 24px;
    }

    /* ── Memory Card — glassmorphism ── */
    .mem-card {
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.9);
      border-radius: 22px;
      overflow: hidden;
      box-shadow: 0 8px 28px rgba(180,100,140,0.10), 0 2px 8px rgba(0,0,0,0.05);
      cursor: pointer;
      transform: translateY(40px);
      opacity: 0;
      transition: transform 0.4s cubic-bezier(0.22,1,0.36,1), box-shadow 0.3s ease;
    }
    .mem-card.visible { transform: translateY(0); opacity: 1; }
    
    /* Desktop hover lift */
    @media (hover: hover) {
      .mem-card:hover {
        transform: translateY(-8px) scale(1.025);
        box-shadow:
          0 24px 56px rgba(180,100,140,0.22),
          0 0 0 1px rgba(244,63,114,0.12),
          0 4px 16px rgba(0,0,0,0.08);
        background: rgba(255,255,255,0.92);
        border-color: rgba(244,63,114,0.18);
      }
    }

    /* Mobile tap feedback */
    .mem-card:active {
      transform: scale(0.975);
      box-shadow: 0 6px 20px rgba(180,100,140,0.18);
    }

    .card-slider {
      position: relative;
      width: 100%;
      padding-top: 68%;
      overflow: hidden;
      background: #f3e8ff;
    }

    .card-slider img {
  filter: blur(25px) brightness(0.6);
  transform: scale(1.1);
  transition: all 0.4s ease;
}

    /* Images visible but lock overlay covers them */
    .slider-track {
      position: absolute;
      inset: 0;
      display: flex;
      transition: transform 0.45s cubic-bezier(0.4,0,0.2,1);
    }
    .slider-track img {
      flex-shrink: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      transition: filter 0.4s ease;
      pointer-events: none;
      user-select: none;
    }
    .mem-card:hover .slider-track img { filter: brightness(0.85); }

    /* Quote overlay — only visible on hover */
    .card-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: flex-end;
      padding: 18px;
      background: linear-gradient(0deg, rgba(100,30,80,0.72) 0%, transparent 60%);
      opacity: 0;
      transition: opacity 0.35s ease;
      pointer-events: none;
    }
    .mem-card:hover .card-overlay { opacity: 1; }

    /* ── Lock overlay — exact gallery.html design ── */
    .lock-overlay {
  position: absolute;
  inset: 0;

  display: flex;
  align-items: center;
  justify-content: center;

  color: white;
  font-size: 14px;
  font-weight: 500;

  z-index: 10;
  border-radius: 22px;

  /* ✅ FIXED BACKGROUND */
  background: 
    linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)),
    url('https://lh3.googleusercontent.com/d/1yqOccwlmusE01Zd17hLBFZfmlnKa4wIW') no-repeat center center;

  background-size: contain;
  background-repeat: no-repeat;
  background-color: #9f4fdd81;

    }
    /* Hidden state after click */
    .lock-overlay.hide {
      opacity: 0;
      pointer-events: none;
    }

    .overlay-text {
      font-family: 'Playfair Display', serif;
      font-size: 14px;
      font-style: italic;
      color: #fff;
      line-height: 1.5;
      text-shadow: 0 1px 6px rgba(0,0,0,0.3);
      transform: translateY(6px);
      transition: transform 0.35s ease;
    }
    .mem-card.revealed:hover .overlay-text { transform: translateY(0); }

    .slider-dots {
      position: absolute;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 5px;
      z-index: 5;
    }
    .s-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: rgba(255,255,255,0.55);
      border: 1px solid rgba(255,255,255,0.7);
      cursor: pointer;
      transition: background 0.2s, transform 0.2s;
    }
    .s-dot.active { background: #fff; transform: scale(1.3); }

    .slider-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 28px; height: 28px;
      border-radius: 50%;
      border: none;
      background: rgba(255,255,255,0.85);
      color: var(--ink);
      font-size: 14px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      opacity: 0;
      transition: opacity 0.25s, transform 0.2s;
      z-index: 6;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }
    .slider-btn.prev { left: 8px; }
    .slider-btn.next { right: 8px; }
    .mem-card:hover .slider-btn { opacity: 1; }
    .slider-btn:hover { transform: translateY(-50%) scale(1.12); }

    .img-count {
      position: absolute;
      top: 10px; right: 10px;
      background: rgba(0,0,0,0.42);
      color: #fff;
      font-size: 11px;
      font-weight: 500;
      padding: 3px 9px;
      border-radius: 20px;
      letter-spacing: 0.5px;
      z-index: 5;
      backdrop-filter: blur(4px);
    }

    .card-body { padding: 18px 20px 20px; }
    .card-tag {
      display: inline-block;
      font-size: 11px; font-weight: 500;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--rose);
      background: rgba(244,63,114,0.09);
      padding: 4px 10px;
      border-radius: 20px;
      margin-bottom: 8px;

      
    }
    .card-title {
      font-family: 'Playfair Display', serif;
      font-size: 18px; color: var(--ink);
      margin-bottom: 6px; line-height: 1.3;
    }
    .card-caption { font-size: 13px; color: #9d7aab; line-height: 1.6; }
    .tap-hint { font-size: 11px; color: #c4b5fd; margin-top: 8px; }

    /* ── Lightbox ── */
    .lightbox {
      position: fixed; inset: 0;
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(20,8,30,0);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.35s ease, background 0.35s ease;
    }
    .lightbox.open {
      opacity: 1;
      pointer-events: all;
      background: rgba(20,8,30,0.9);
    }
    .lb-backdrop { position: absolute; inset: 0; cursor: zoom-out; }
    .lb-box {
      position: relative;
      background: #fff;
      border-radius: 24px;
      overflow: hidden;
      width: min(92vw, 700px);
      max-height: 90vh;
      display: flex;
      flex-direction: column;
      box-shadow: 0 40px 100px rgba(0,0,0,0.5);
      transform: scale(0.8) translateY(24px);
      transition: transform 0.42s cubic-bezier(0.34,1.2,0.64,1);
      z-index: 1;
    }
    .lightbox.open .lb-box { transform: scale(1) translateY(0); }
    .lb-close {
      position: absolute;
      top: 14px; right: 14px;
      width: 36px; height: 36px;
      border-radius: 50%;
      border: none;
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(6px);
      font-size: 16px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      z-index: 10;
      box-shadow: 0 2px 12px rgba(0,0,0,0.15);
      transition: transform 0.2s, background 0.2s;
      color: var(--ink);
    }
    .lb-close:hover { background: #fff; transform: scale(1.1) rotate(90deg); }
    .lb-img-area {
      position: relative;
      width: 100%;
      padding-top: 58%;
      background: #1a0a22;
      overflow: hidden;
      flex-shrink: 0;
    }
    .lb-track {
      position: absolute;
      inset: 0;
      display: flex;
      transition: transform 0.45s cubic-bezier(0.4,0,0.2,1);
    }
    .lb-track img {
      flex-shrink: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      background:
        linear-gradient(rgba(249,244,255,0.5), rgba(249,244,255,0.368)),
        url('https://lh3.googleusercontent.com/d/13L6ka7Ox5eJ96K3QBnPLQKpniD13No2c') no-repeat center center;
      background-size: cover;
      background-position: left 5%;
    }
    .lb-arrow {
      position: absolute;
      top: 50%; transform: translateY(-50%);
      width: 42px; height: 42px;
      border-radius: 50%;
      border: none;
      background: rgba(255,255,255,0.18);
      backdrop-filter: blur(8px);
      color: #fff;
      font-size: 20px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      z-index: 5;
      transition: background 0.2s, transform 0.2s;
    }
    .lb-arrow:hover { background: rgba(255,255,255,0.32); transform: translateY(-50%) scale(1.08); }
    .lb-arrow.prev { left: 14px; }
    .lb-arrow.next { right: 14px; }
    .lb-dots {
      position: absolute;
      bottom: 14px; left: 50%;
      transform: translateX(-50%);
      display: flex; gap: 7px;
    }
    .lb-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,0.4);
      border: 1.5px solid rgba(255,255,255,0.7);
      cursor: pointer;
      transition: background 0.2s, transform 0.2s;
    }
    .lb-dot.active { background: #fff; transform: scale(1.3); }
    .lb-content { padding: 22px 26px 26px; overflow-y: auto; }
    .lb-tag {
      display: inline-block;
      font-size: 11px; font-weight: 500;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--rose);
      background: rgba(244,63,114,0.09);
      padding: 4px 10px;
      border-radius: 20px;
      margin-bottom: 10px;
    }
    .lb-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(20px,4vw,26px);
      color: var(--ink);
      margin-bottom: 8px;
      line-height: 1.25;
    }
    .lb-caption { font-size: 15px; color: #9d7aab; line-height: 1.7; margin-bottom: 14px; }
    .lb-quote {
      border-left: 3px solid var(--lavender);
      padding-left: 14px;
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 15px;
      color: #c084fc;
      line-height: 1.6;
      margin-bottom: 16px;
    }
    .lb-thumbs { display: flex; gap: 8px; flex-wrap: wrap; }
    .lb-thumb {
      width: 58px; height: 44px;
      border-radius: 8px;
      overflow: hidden;
      cursor: pointer;
      border: 2px solid transparent;
      transition: border-color 0.2s, transform 0.2s;
      flex-shrink: 0;
    }
    .lb-thumb img { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }
    .lb-thumb.active { border-color: var(--rose); transform: scale(1.07); }

    /* ── Bottom area ── */
    .bottom-area {
  display: flex !important;
  flex-direction: column !important;
  align-items: center !important;
  justify-content: center !important;
  margin-top: 80px !important;
  gap: 16px !important;
}
    .bottom-message {
 position: static !important;
  top: auto !important;
  left: auto !important;
  transform: none !important;

  text-align: center;
  color: white;
  font-size: 16px;
  font-family: 'Playfair Display', serif;

  background: rgba(0,0,0,0.4);
  padding: 8px 16px;
  border-radius: 20px;
  backdrop-filter: blur(6px);
}
    


    .next-btn {
      display: inline-flex; align-items: center; gap: 10px;
      padding: 16px 42px; border-radius: 50px; border: none;
      background: linear-gradient(135deg, #f43f72 0%, #c084fc 100%);
      color: #fff;
      font-family: 'Playfair Display', serif;
      font-size: 18px; font-style: italic;
      cursor: pointer;
      box-shadow: 0 8px 28px rgba(244,63,114,0.35);
      transition: transform 0.2s, box-shadow 0.2s;
      position: relative; overflow: hidden;
    }
    .next-btn::before {
      content: ''; position: absolute; inset: 0;
      background: rgba(255,255,255,0.15);
      opacity: 0; transition: opacity 0.2s;
    }
    .next-btn:hover { transform: translateY(-3px) scale(1.03); box-shadow: 0 14px 36px rgba(244,63,114,0.42); }
    .next-btn:hover::before { opacity: 1; }
    .next-btn:active { transform: scale(0.98); }
    .btn-icon { font-size: 22px; transition: transform 0.3s; }
    .next-btn:hover .btn-icon { transform: rotate(15deg) scale(1.2); }

    /* ── Page overlay ── */
    .page-overlay {
      position: fixed; inset: 0;
      background: var(--mist);
      z-index: 300;
      opacity: 0; pointer-events: none;
      transition: opacity 0.6s ease;
    }
    .page-overlay.active { opacity: 1; pointer-events: all; }
    @keyframes fadeDown { from{opacity:0;transform:translateY(-20px);} to{opacity:1;transform:translateY(0);} }
    @keyframes fadeUp   { from{opacity:0;transform:translateY(20px);}  to{opacity:1;transform:translateY(0);} }
    @media (max-width: 500px) {
      .grid { grid-template-columns: 1fr; }
      .page { padding: 40px 16px 80px; }
      .lb-box { border-radius: 18px; }
      .lb-content { padding: 16px 18px 22px; }
    }
    /* ── Ambient hearts ── */
    .hearts-layer { position: fixed; inset: 0; pointer-events: none; z-index: 1; }

    .fheart {
      position: fixed;
      pointer-events: none;
      z-index: 9998;
      animation: premiumFloat linear forwards;
      transform-origin: center;
      will-change: transform, opacity;
    }
    @keyframes premiumFloat {
      0%   { opacity: 0; transform: translateY(0) translateX(0) scale(0.6) rotate(0deg); }
      8%   { opacity: 1; }
      50%  { opacity: 0.85; transform: translateY(var(--fy50)) translateX(var(--fx50)) scale(1.05) rotate(var(--fr50)); }
      88%  { opacity: 0.2; }
      100% { opacity: 0; transform: translateY(var(--fy100)) translateX(var(--fx100)) scale(0.75) rotate(var(--fr100)); }
    }

    .ambient-heart {
      position: fixed;
      pointer-events: none;
      z-index: 0;
      animation: ambientFloat linear infinite;
      will-change: transform, opacity;
    }
    @keyframes ambientFloat {
      0%   { opacity: 0; transform: translateY(105vh) translateX(0) rotate(0deg) scale(0.8); }
      6%   { opacity: 0.4; }
      94%  { opacity: 0.15; }
      100% { opacity: 0; transform: translateY(-15vh) translateX(var(--ax)) rotate(360deg) scale(1.1); }
    }

    @keyframes fadeDown { from{opacity:0;transform:translateY(-20px);} to{opacity:1;transform:translateY(0);} }
    @keyframes fadeUp   { from{opacity:0;transform:translateY(20px);}  to{opacity:1;transform:translateY(0);} }

    @media (max-width: 500px) {
      .grid { grid-template-columns: 1fr; }
      .page { padding: 40px 16px 80px; }
      .lb-box { border-radius: 18px; }
      .lb-content { padding: 16px 18px 22px; }
    }

    /* 🔒 FULL CARD LOCK — hide card body when locked */
    .mem-card.locked .card-body {
      opacity: 0;
      pointer-events: none;
    }

    /* smooth reveal */
    .mem-card.revealed .card-body {
      opacity: 1;
      transition: opacity 0.5s ease;
    }
  </style>
</head>
<body>

  <div class="hearts-layer" id="heartsLayer"></div>
  <div class="page-overlay" id="pageOverlay"></div>

  <!-- LIGHTBOX -->
  <div class="lightbox" id="lightbox" role="dialog" aria-modal="true">
    <div class="lb-backdrop" id="lbBackdrop"></div>
    <div class="lb-box">
      <button class="lb-close" id="lbClose">✕</button>
      <div class="lb-img-area">
        <div class="lb-track" id="lbTrack"></div>
        <button class="lb-arrow prev" id="lbPrev">&#8249;</button>
        <button class="lb-arrow next" id="lbNext">&#8250;</button>
        <div class="lb-dots" id="lbDots"></div>
      </div>
      <div class="lb-content">
        <span class="lb-tag" id="lbTag"></span>
        <h2 class="lb-title" id="lbTitle"></h2>
        <p class="lb-caption" id="lbCaption"></p>
        <div class="lb-quote" id="lbQuote"></div>
        <div class="lb-thumbs" id="lbThumbs"></div>
      </div>
    </div>
  </div>

  <!-- PAGE -->
  <div class="page">
    <header class="page-header">
      <p class="eyebrow">A little trip down memory lane</p>
      <h1>Our <em>Memories</em> 💙</h1>
      <p>Every one of these moments made me smile. Click any card to relive it fully.</p>
      <div class="divider">✦</div>
    </header>
    <div class="grid" id="grid"></div>
    <div class="bottom-area">
      <button class="next-btn" onclick="goNext()">
        <span>Next Surprise</span>
        <span class="btn-icon">🎁</span>
      </button>
      <div class="bottom-message">Innum Naraiya Irukku Add panna Mudila😅</div>
    </div>
  </div>

<script>
/* ════════════════════════════════════════════════
   PREMIUM HEART ENGINE
   ════════════════════════════════════════════════ */
const HEART_EMOJIS   = ['💙','💜','🩷','✨','🌸','💫','💖','❤️','💗','🩶','🌟','💝','🌺','🎀'];
const AMBIENT_EMOJIS = ['💙','💜','🩷','💖','❤️','💗','🩶','💝'];

let _lastPointerHeart = 0;
const _THROTTLE = 90;

function spawnPointerHeart(x, y) {
  const now = Date.now();
  if (now - _lastPointerHeart < _THROTTLE) return;
  _lastPointerHeart = now;

  const emoji = HEART_EMOJIS[Math.floor(Math.random() * HEART_EMOJIS.length)];
  const size  = 13 + Math.random() * 14;
  const dur   = size < 20 ? (5.5 + Math.random() * 3.5) : (3.8 + Math.random() * 2.5);

  const driftX = (Math.random() - 0.5) * 60;
  const fy50   = -(60 + Math.random() * 80) + 'px';
  const fy100  = -(160 + Math.random() * 140) + 'px';
  const fx50   = (driftX * 0.55).toFixed(1) + 'px';
  const fx100  = driftX.toFixed(1) + 'px';
  const fr50   = ((Math.random() - 0.5) * 18).toFixed(1) + 'deg';
  const fr100  = ((Math.random() - 0.5) * 32).toFixed(1) + 'deg';

  const el = document.createElement('span');
  el.textContent = emoji;
  el.style.cssText = `
    left: ${x + (Math.random() * 14 - 7)}px;
    top:  ${y + (Math.random() * 10 - 5)}px;
    font-size: ${size}px;
    animation-duration: ${dur}s;
    animation-delay: 0s;
    filter: drop-shadow(0 0 ${3 + size * 0.25}px rgba(244,63,114,0.75))
            drop-shadow(0 0 ${6 + size * 0.4}px rgba(192,132,252,0.5));
    --fy50: ${fy50}; --fx50: ${fx50}; --fr50: ${fr50};
    --fy100: ${fy100}; --fx100: ${fx100}; --fr100: ${fr100};
  `;
  el.className = 'fheart';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), dur * 1000 + 200);
}

/* Desktop */
document.addEventListener('mousemove', e => spawnPointerHeart(e.clientX, e.clientY));
/* Mobile drag */
document.addEventListener('touchmove', e => {
  const t = e.touches[0];
  spawnPointerHeart(t.clientX, t.clientY);
}, { passive: true });

/* Ambient hearts */
const layer = document.getElementById('heartsLayer');
function spawnAmbient() {
  const emoji = AMBIENT_EMOJIS[Math.floor(Math.random() * AMBIENT_EMOJIS.length)];
  const size  = 11 + Math.random() * 13;
  const dur   = 10 + Math.random() * 12;
  const ax    = ((Math.random() - 0.5) * 80).toFixed(1) + 'px';

  const el = document.createElement('span');
  el.className = 'ambient-heart';
  el.textContent = emoji;
  el.style.cssText = `
    left: ${Math.random() * 100}vw;
    font-size: ${size}px;
    opacity: 0;
    animation-duration: ${dur}s;
    animation-delay: ${Math.random() * 4}s;
    filter: drop-shadow(0 0 4px rgba(244,63,114,0.5));
    --ax: ${ax};
  `;
  layer.appendChild(el);
  setTimeout(() => el.remove(), (dur + 5) * 1000);
}
setInterval(spawnAmbient, 900);
for (let i = 0; i < 7; i++) spawnAmbient();

/* ════ BUILD CARDS ════ */
const grid = document.getElementById('grid');

CARDS.forEach((card, cardIdx) => {
  const el = document.createElement('div');
  el.className = 'mem-card';
  el.setAttribute('tabindex', '0');

  const slidesHTML = card.images.map(src =>
    '<img src="' + src + '" alt="' + card.title + '" loading="lazy"/>'
  ).join('');

  const dotsHTML = card.images.length > 1
    ? card.images.map((_, i) =>
        '<span class="s-dot ' + (i===0?'active':'') + '" data-idx="' + i + '"></span>'
      ).join('')
    : '';

  el.innerHTML =
    '<div class="card-slider">' +
      '<div class="lock-overlay">🔒 Tap to reveal</div>'
      '<div class="slider-track">' + slidesHTML + '</div>' +
      (card.images.length > 1 ? '<button class="slider-btn prev">&#8249;</button>' : '') +
      (card.images.length > 1 ? '<button class="slider-btn next">&#8250;</button>' : '') +
      '<div class="slider-dots">' + dotsHTML + '</div>' +
      (card.images.length > 1 ? '<span class="img-count">1 / ' + card.images.length + ' \uD83D\uDCF7</span>' : '') +
      '<div class="card-overlay"><p class="overlay-text">' + card.quote + '</p></div>' +
    '</div>' +
    '<div class="card-body">' +
      '<span class="card-tag">' + card.tag + '</span>' +
      '<h3 class="card-title">' + card.title + '</h3>' +
      '<p class="card-caption">' + card.caption + '</p>' +
      '<p class="tap-hint">\uD83D\uDCF8 Tap image to expand &middot; ' + card.images.length + ' photo' + (card.images.length>1?'s':'') + '</p>' +
    '</div>';
    
  let currentSlide = 0;

  function gotoSlide(n) {
    const total = card.images.length;
    currentSlide = (n + total) % total;
    el.querySelector('.slider-track').style.transform = 'translateX(-' + (currentSlide * 100) + '%)';
    el.querySelectorAll('.s-dot').forEach(function(d,i){ d.classList.toggle('active', i===currentSlide); });
    var badge = el.querySelector('.img-count');
    if (badge) badge.textContent = (currentSlide+1) + ' / ' + total + ' \uD83D\uDCF7';
  }

  var pBtn = el.querySelector('.slider-btn.prev');
  var nBtn = el.querySelector('.slider-btn.next');
  if (pBtn) pBtn.addEventListener('click', function(e){ e.stopPropagation(); gotoSlide(currentSlide-1); });
  if (nBtn) nBtn.addEventListener('click', function(e){ e.stopPropagation(); gotoSlide(currentSlide+1); });

  el.querySelectorAll('.s-dot').forEach(function(dot){
    dot.addEventListener('click', function(e){ e.stopPropagation(); gotoSlide(+dot.dataset.idx); });
  });

  el.addEventListener('click', function(){ openLightbox(cardIdx, currentSlide); });
  el.addEventListener('keydown', function(e){ if(e.key==='Enter') openLightbox(cardIdx, currentSlide); });

  grid.appendChild(el);
});

/* Intersection observer */
var memCards = document.querySelectorAll('.mem-card');
var observer = new IntersectionObserver(function(entries){
  entries.forEach(function(entry){
    if (entry.isIntersecting) {
      var idx = Array.from(memCards).indexOf(entry.target);
      setTimeout(function(){ entry.target.classList.add('visible'); }, idx * 90);
      observer.unobserve(entry.target);
    }
  });
}, { threshold: 0.1 });
memCards.forEach(function(c){ observer.observe(c); });

/* ════ LIGHTBOX ════ */
var lightbox   = document.getElementById('lightbox');
var lbTrack    = document.getElementById('lbTrack');
var lbDots     = document.getElementById('lbDots');
var lbThumbs   = document.getElementById('lbThumbs');
var lbPrev     = document.getElementById('lbPrev');
var lbNext     = document.getElementById('lbNext');
var lbClose    = document.getElementById('lbClose');
var lbBackdrop = document.getElementById('lbBackdrop');
var lbCurrent  = 0;
var lbImages   = [];

function openLightbox(cardIdx, startImg) {
  startImg = startImg || 0;
  var card = CARDS[cardIdx];
  lbImages = card.images;
  lbCurrent = startImg;

  lbTrack.innerHTML = card.images.map(function(src){
    return '<img src="' + src + '" alt="' + card.title + '"/>';
  }).join('');
  lbTrack.style.transition = 'none';
  lbTrack.style.transform  = 'translateX(-' + (startImg*100) + '%)';
  requestAnimationFrame(function(){
    requestAnimationFrame(function(){ lbTrack.style.transition = ''; });
  });

  lbDots.innerHTML = card.images.map(function(_,i){
    return '<span class="lb-dot ' + (i===startImg?'active':'') + '" data-idx="' + i + '"></span>';
  }).join('');
  lbDots.querySelectorAll('.lb-dot').forEach(function(d){
    d.addEventListener('click', function(){ lbGoto(+d.dataset.idx); });
  });

  lbThumbs.innerHTML = card.images.map(function(src,i){
    return '<div class="lb-thumb ' + (i===startImg?'active':'') + '" data-idx="' + i + '"><img src="' + src + '" alt="thumb" loading="lazy"/></div>';
  }).join('');
  lbThumbs.querySelectorAll('.lb-thumb').forEach(function(t){
    t.addEventListener('click', function(){ lbGoto(+t.dataset.idx); });
  });

  lbPrev.style.display = card.images.length > 1 ? '' : 'none';
  lbNext.style.display = card.images.length > 1 ? '' : 'none';

  document.getElementById('lbTag').textContent     = card.tag;
  document.getElementById('lbTitle').textContent   = card.title;
  document.getElementById('lbCaption').textContent = card.caption;
  document.getElementById('lbQuote').textContent   = card.quote;

  lightbox.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function lbGoto(n) {
  lbCurrent = (n + lbImages.length) % lbImages.length;
  lbTrack.style.transform = 'translateX(-' + (lbCurrent*100) + '%)';
  lbDots.querySelectorAll('.lb-dot').forEach(function(d,i){ d.classList.toggle('active', i===lbCurrent); });
  lbThumbs.querySelectorAll('.lb-thumb').forEach(function(t,i){ t.classList.toggle('active', i===lbCurrent); });
}

function closeLightbox() {
  lightbox.classList.remove('open');
  document.body.style.overflow = '';
}

lbPrev.addEventListener('click', function(){ lbGoto(lbCurrent-1); });
lbNext.addEventListener('click', function(){ lbGoto(lbCurrent+1); });
lbClose.addEventListener('click', closeLightbox);
lbBackdrop.addEventListener('click', closeLightbox);

document.addEventListener('keydown', function(e){
  if (!lightbox.classList.contains('open')) return;
  if (e.key === 'ArrowLeft')  lbGoto(lbCurrent-1);
  if (e.key === 'ArrowRight') lbGoto(lbCurrent+1);
  if (e.key === 'Escape')     closeLightbox();
});

var touchStartX = 0;
lightbox.addEventListener('touchstart', function(e){ touchStartX = e.touches[0].clientX; }, {passive:true});
lightbox.addEventListener('touchend', function(e){
  var diff = touchStartX - e.changedTouches[0].clientX;
  if (Math.abs(diff) > 40) lbGoto(lbCurrent + (diff>0 ? 1 : -1));
}, {passive:true});

/* Page fade in */
document.body.style.opacity = 0;
document.body.style.transition = 'opacity 0.5s ease';
requestAnimationFrame(function(){ requestAnimationFrame(function(){ document.body.style.opacity = 1; }); });

  document.getElementById('pageOverlay').classList.add('active');
  setTimeout(function(){ window.location.href = 'final.html'; }, 700);
}
